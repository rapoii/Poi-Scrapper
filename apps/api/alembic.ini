[alembic]
# Path ke migration scripts
script_location = alembic

# File template untuk versi baru
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Timezone untuk timestamp revision
timezone = UTC

# Max karakter untuk slug
truncate_slug_length = 40

# Path separator (gunakan os-default)
version_path_separator = os

# sqlalchemy.url dibaca dari env var di env.py (lihat DATABASE_URL_SYNC)
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Format migration baru dengan ruff
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
